<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Practical 01</title>

    <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
    <canvas id="canvas" width="600px" height="600px"></canvas>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TeapotGeometry } from 'three/addons/geometries/TeapotGeometry.js';

        let scene, camera;
        let controls;
        let meshes = [];
        init();

        function createLight() {

            const light = new THREE.AmbientLight(0x504040);
            scene.add(light);

            //https://threejs.org/docs/?q=Point#PointLight
            meshes.forEach((mesh, index) => {
                let color = 0xffffff;
                const pl = new THREE.PointLight(color, 1, 0, 2);
                pl.position.set(0, 1.5, 0);
                mesh.add(pl);

            });

            //https://threejs.org/docs/#SpotLight
            meshes.forEach((mesh, index) => {
                let color = 0xffffff;
                const pl = new THREE.SpotLight(
                    color, 1, 0, 40 * Math.PI / 180, 1.0);
                pl.position.set(0, 0, 1.5);
                pl.target.position.set(0, 0, 0);
                mesh.add(pl);
                mesh.add(pl.target);

            });

            // direciontal light connected to the camera
            const directionalLight = new THREE.DirectionalLight(0xcccccc, 0.2);
            directionalLight.position.set(0, 0, 0);
            directionalLight.target.position.set(0, 0, 0);

            scene.add(directionalLight.target);
            camera.add(directionalLight);

        }

        function createGeometry() {
            const geometry = new TeapotGeometry(0.5, 10);
            const lambert = new THREE.MeshLambertMaterial({
                color: '#eeeeee'
            });

            const phong = new THREE.MeshPhongMaterial({
                color: '#eeeeee',
                specular: '#ffffff',
                shininess: 30,
            });

            const phong2 = new THREE.MeshPhongMaterial({
                color: '#eeeeee',
                specular: '#ffffff',
                shininess: 200,
            });

            const materials = [lambert, phong, phong2]

            for (let i = 0; i < 3; i++) {
                let mesh = new THREE.Mesh(geometry, materials[i]);
                mesh.position.set(3 * i - 3, 0, 0);
                scene.add(mesh);
                meshes.push(mesh);

            }

        }

        function createCamera() {
            const aspect = canvas.clientWidth / canvas.clientHeight;
            camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100);
            camera.position.set(2, 5, 5);
            scene.add(camera);
        }



        /** Updates the elements of the scene before the call to render */
        function update(time) {


        }

        /** Creates the scene and initalizes the elements in it **/
        function init() {
            const canvas = document.querySelector('#canvas');

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#111');

            createCamera();
            createGeometry();
            createLight();

            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            //renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);

            renderer.setAnimationLoop((time) => {
                update(time);
                controls.update();
                renderer.render(scene, camera);
            });

            // Helpers (could be removed!)
            // ------------------------------------
            controls = new OrbitControls(camera, renderer.domElement);
            controls.update();

            // const gridHelper = new THREE.GridHelper(20, 20, '#222', '#333');
            // scene.add(gridHelper);

            // const axesHelper = new THREE.AxesHelper(2);
            // scene.add(axesHelper);
        }


    </script>
</body>

</html>
